name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra gateway --python ${{ matrix.python-version }}
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Type-check
        run: uv run mypy
      - name: Test
        run: uv run pytest
